name: Build
on: pull_request
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: net10.0-android
          - os: windows-latest
            target: net10.0-windows10.0.19041.0
          - os: macos-latest
            target: net10.0-ios
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install MAUI Workloads
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            dotnet workload install maui-android --source https://api.nuget.org/v3/index.json
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            dotnet workload install maui-windows --source https://api.nuget.org/v3/index.json
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            dotnet workload install maui-ios --source https://api.nuget.org/v3/index.json
          fi
        shell: bash
      - name: Check Google API Key
        if: matrix.os == 'ubuntu-latest'
        run: |
          if [ -z "$GOOGLEAPIKEY" ]; then
            echo "Key NOT set"
          else
            echo "Key IS set (length: ${#GOOGLEAPIKEY})"
          fi
        env:
          GOOGLEAPIKEY: ${{ secrets.GOOGLEAPIKEY }}
      - name: Build
        run: dotnet publish -f:${{ matrix.target }} -c:Release /p:google_maps_api_key=${{ secrets.GOOGLEAPIKEY }}
